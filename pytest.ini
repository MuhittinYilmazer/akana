[pytest]
asyncio_mode = auto
testpaths = tests
# src first so `import akana` resolves to src/akana (not the root akana.py launcher).
# tests/conftest.py additionally routes through _akana_src_bootstrap.ensure_src_on_path()
# — the SINGLE mechanism every entry point uses — so the resolution is uniform.
pythonpath = src .
addopts = -p no:ament_flake8 -p no:ament_pep257 -p no:ament_copyright
# ROS/ament global plugins can break an isolated venv
norecursedirs = venv .venv cursor_bridge/node_modules
markers =
    e2e: real-lifespan + fake-LLM end-to-end smoke journeys (included in the default run; use -m "not e2e" to skip)
